# Nginx Load Balancer Configuration for GlobalConnect Dating App
# Place this in /etc/nginx/nginx.conf or /etc/nginx/sites-available/globalconnect

upstream api_servers {
    least_conn;
    
    server localhost:3001 weight=5;
    server localhost:3002 weight=5;
    server localhost:3003 weight=3;
    server localhost:3004 weight=3;
    
    keepalive 32;
}

upstream websocket_servers {
    least_conn;
    
    server localhost:3001;
    server localhost:3002;
    server localhost:3003;
    server localhost:3004;
}

server {
    listen 80;
    server_name api.globalconnect.com;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=swipe_limit:10m rate=30r/s;
    
    # Client body size
    client_max_body_size 10M;
    
    # Health check endpoint (no rate limit)
    location /health {
        proxy_pass http://api_servers;
        access_log off;
    }
    
    # WebSocket endpoint
    location /ws {
        proxy_pass http://websocket_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
    
    # API endpoints with rate limiting
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        
        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Caching headers
        proxy_cache_valid 200 1m;
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # Authentication endpoints (stricter rate limit)
    location /api/auth/login {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Swipe endpoints (specific rate limit)
    location /api/swipe {
        limit_req zone=swipe_limit burst=30 nodelay;
        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Disable caching for swipes
        proxy_cache off;
    }
    
    # Static assets
    location /static/ {
        alias /var/www/globalconnect/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Media uploads
    location /uploads/ {
        alias /var/www/globalconnect/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }
}

# HTTPS server (Production SSL/TLS)
server {
    listen 443 ssl http2;
    server_name api.globalconnect.com;
    
    # SSL Certificate Configuration
    ssl_certificate /etc/letsencrypt/live/globalconnect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globalconnect.com/privkey.pem;
    
    # SSL Security Settings
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # HSTS (uncomment after testing)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=swipe_limit:10m rate=30r/s;
    
    # Client body size
    client_max_body_size 10M;
    
    # Health check endpoint (no rate limit)
    location /health {
        proxy_pass http://api_servers;
        access_log off;
    }
    
    # WebSocket endpoint
    location /ws {
        proxy_pass http://websocket_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
    
    # API endpoints with rate limiting
    location /api/ {
        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        limit_req zone=api_limit burst=20 nodelay;
    }
    
    # Admin endpoints with stricter rate limiting
    location /api/admin/ {
        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        limit_req zone=api_limit burst=10 nodelay;
    }
    
    # Static assets with caching
    location /static/ {
        proxy_pass http://api_servers;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Media uploads
    location /uploads/ {
        alias /var/www/globalconnect/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }
}

# Connection limits per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name globalconnect.com www.globalconnect.com;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
    
    location / {
        root /var/www/globalconnect/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
