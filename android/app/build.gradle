apply plugin: 'com.android.application'

android {
    namespace = "com.globalconnect.dating"
    compileSdk = 34
    defaultConfig {
        applicationId = "com.globalconnect.dating"
        minSdkVersion = 22
        targetSdkVersion = 34
        versionCode = 1
        versionName = "1.0"
    }
    buildTypes {
        release {
            minifyEnabled = false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:1.6.1"
}
